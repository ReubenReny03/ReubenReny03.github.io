        <body>

          <script>
            var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      
            setInterval(function() {
              var date = new Date();
              var day = days[date.getDay()];
              if (day="Tuesday") {
                document.getElementById("text").innerHTML = "Hello " + day + "<br><br> 20CS2036 Operating Systems Batch 5 - CSLH006 <br><br> 20CS2008 Computer Networks Batch 3 - CSLH003 <br><br>	20CS2008L Computer Networks Batch 1 - CTC Lab 1	<br><br> 20CS2008L Computer Networks Batch 1 - CTC Lab 1 <br><br> 20CS2018 Design and Analysis of Algorithm Batch 1 - CSLH001 <br><br> 20MS2007 Business Plan Batch 4 - CSLH001" ;

            }
            else{
                document.getElementById("text").innerHTML = "Hello, world! " + day;
            }
              
            }, 1000);
          </script>
        </body>
      </html>
